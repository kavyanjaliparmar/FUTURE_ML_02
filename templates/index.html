<!DOCTYPE html>
<html>
<head>
    <title>Ticket Classifier</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 38px;
            margin-bottom: 30px;
        }

        textarea {
            width: 60%;
            height: 120px;
            border-radius: 18px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            color: white;
            border: none;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #38bdf8;
            border: none;
            border-radius: 18px;
            cursor: pointer;
        }

        /* CHAT */
        .chat-container {
            margin-top: 40px;
            width: 60%;
            margin-left: auto;
            margin-right: auto;

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .chat-message {
            max-width: 70%;
            padding: 14px 18px;
            border-radius: 18px;
        }

        .user-msg {
            background: #38bdf8;
        }

        .bot-msg {
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
        }

        /* GLOW EFFECT */
        .bot-msg {
            position: relative;
        }

        .bot-msg::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: linear-gradient(135deg, #38bdf8, transparent);
            opacity: 0.2;
            animation: glow 3s infinite;
        }

        @keyframes glow {
            0% { opacity: 0.1; }
            50% { opacity: 0.3; }
            100% { opacity: 0.1; }
        }

        /* LOADING */
        .loading {
            margin-top: 20px;
            font-size: 18px;
            opacity: 0.7;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* FADE IN */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .priority-high { color: #ef4444; }
        .priority-medium { color: #facc15; }
        .priority-low { color: #22c55e; }

        .progress-bar {
            width: 100%;
            background: #334155;
            border-radius: 10px;
            margin-top: 10px;
        }

        .progress {
            height: 10px;
            background: #38bdf8;
        }
    </style>
</head>

<body>

<h1>Support Ticket Classifier</h1>

<form method="POST">
    <textarea name="ticket">{{ ticket }}</textarea><br>
    <button type="submit">Analyze Ticket</button>
</form>

{% if ticket %}
<div class="chat-container">

    <div class="chat-message user-msg">
        {{ ticket }}
    </div>

    <div id="loading" class="loading">
        Analyzing...
    </div>

    {% if prediction %}
    <div id="result" class="chat-message bot-msg" style="display:none;">

        <div>Category: <b>{{ prediction }}</b></div>

        <div>
            Priority:
            <b class="
            {% if priority == 'High' %}priority-high
            {% elif priority == 'Medium' %}priority-medium
            {% else %}priority-low
            {% endif %}
            ">
            {{ priority }}
            </b>
        </div>

        <div>Confidence: {{ confidence }}%</div>

        <div class="progress-bar">
            <div class="progress" style="width: {{ confidence }}%"></div>
        </div>

    </div>
    {% endif %}

</div>
{% endif %}

<script>
    setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
        const result = document.getElementById('result');
        if(result){
            result.style.display = 'block';
        }
    }, 1200);
</script>

</body>
</html>
